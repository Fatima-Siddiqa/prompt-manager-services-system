events {}

http {
    include mime.types;

    server {
        listen 80;

        # serve the built React app
        location / {
            root /path/to/prompt-manager/frontend/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # proxy to prompt-service
        location /api/prompts/ {
            rewrite ^/api/prompts/(.*) /$1 break;
            proxy_pass http://localhost:8000;
            proxy_set_header Host $host;
        }

        # proxy to review-service
        location /api/reviews/ {
            rewrite ^/api/reviews/(.*) /$1 break;
            proxy_pass http://localhost:8001;
            proxy_set_header Host $host;
        }
    }
}